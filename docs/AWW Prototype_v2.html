/* ─── LOGO ───────────────────────────────────────────────────────── */
function Logo({size=32,showText=true}){
  const t=useT();
  const r=size*0.135,cx=size*0.12,cy=size*0.5,mx=size*0.5,my=size*0.5,rx=size*0.88,ry=size*0.5;
  return(
    <div style={{display:'flex',alignItems:'center',gap:size*0.28}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
        <line x1={cx+r} y1={cy} x2={mx-r*1.5} y2={my} stroke={t.p} strokeWidth={size*0.044} strokeLinecap="round" opacity="0.4"/>
        <line x1={mx+r*1.5} y1={my} x2={rx-r} y2={ry} stroke={t.p} strokeWidth={size*0.044} strokeLinecap="round" opacity="0.4"/>
        <circle cx={cx} cy={cy} r={r} fill={t.agl} stroke={t.ag} strokeWidth={size*0.048}/>
        <circle cx={mx} cy={my} r={r*1.38} fill={t.p}/>
        <circle cx={mx} cy={my-r*0.28} r={r*0.44} fill={t.pt} opacity="0.95"/>
        <path d={`M${mx-r*0.68} ${my+r*0.55} Q${mx-r*0.45} ${my+r*0.08} ${mx} ${my+r*0.08} Q${mx+r*0.45} ${my+r*0.08} ${mx+r*0.68} ${my+r*0.55}`} fill={t.pt} opacity="0.95"/>
        <circle cx={rx} cy={ry} r={r} fill={t.okl} stroke={t.ok} strokeWidth={size*0.048}/>
        <path d={`M${rx-r*0.48} ${ry} L${rx-r*0.08} ${ry+r*0.42} L${rx+r*0.52} ${ry-r*0.46}`} stroke={t.ok} strokeWidth={size*0.058} strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      </svg>
      {showText&&<span style={{fontWeight:700,fontSize:size*0.44,letterSpacing:-0.5,color:t.tx,lineHeight:1}}>AWW</span>}
    </div>
  );
}

  const t=useT();

function Btn({children,variant='primary',size='md',onClick,style={},disabled=false}){
  const t=useT();const[h,sh]=useState(false);
  const S={sm:{padding:'5px 11px',fontSize:12},md:{padding:'8px 16px',fontSize:13.5},lg:{padding:'11px 24px',fontSize:15}};
  const V={
    primary:{bg:h?t.ph:t.p,color:t.pt,brd:'none',shd:`0 2px 12px ${t.p}50`},
    ghost:{bg:h?t.pl:'transparent',color:t.p,brd:`1px solid ${h?t.pb:'transparent'}`},
    outline:{bg:h?'rgba(0,0,0,0.04)':'transparent',color:t.txm,brd:'1px solid rgba(0,0,0,0.11)'},
    danger:{bg:h?t.erl:'transparent',color:t.er,brd:`1px solid ${h?t.er:'rgba(0,0,0,0.11)'}`},
    agent:{bg:h?t.agl:'transparent',color:t.ag,brd:`1px solid ${h?t.ag:'rgba(0,0,0,0.11)'}`},
    success:{bg:h?t.okl:t.ok,color:'#fff',brd:'none',shd:`0 2px 12px ${t.ok}50`},
    icon:{bg:h?'rgba(0,0,0,0.07)':'rgba(0,0,0,0.04)',color:t.txm,brd:'1px solid rgba(0,0,0,0.08)'},
  };
  const v=V[variant]||V.primary;
  return(
    <button onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} onClick={onClick} disabled={disabled} style={{
      display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5,
      borderRadius:9,cursor:disabled?'not-allowed':'pointer',
      fontFamily:'DM Sans,sans-serif',fontWeight:600,letterSpacing:-0.1,
      transition:'all 0.13s ease',opacity:disabled?0.45:1,
      background:v.bg,color:v.color,border:v.brd||'none',boxShadow:v.shd||'none',
      ...S[size],...style
    }}>{children}</button>
  );
}
function Badge({children,color='gray'}){
  const t=useT();
  const C={green:{bg:t.okl,tx:t.ok},red:{bg:t.erl,tx:t.er},amber:{bg:t.pl,tx:t.p},teal:{bg:t.agl,tx:t.ag},gray:{bg:'oklch(92% 0.001 0)',tx:'oklch(52% 0.003 0)'},purple:{bg:'oklch(94% 0.05 285)',tx:'oklch(55% 0.18 285)'}};
  const c=C[color]||C.gray;
  return <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:5,fontSize:11,fontWeight:600,letterSpacing:0.1,background:c.bg,color:c.tx,flexShrink:0}}>{children}</span>;
}
function Dot({status}){
  const t=useT();
  const M={completed:{c:t.ok},running:{c:t.ag,pulse:true},waiting:{c:t.p,pulse:true},pending:{c:'oklch(80% 0.003 0)'},failed:{c:t.er}};
  const s=M[status]||M.pending;
  return(
    <span style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center',width:10,height:10,flexShrink:0}}>
      {s.pulse&&<span style={{position:'absolute',inset:-3,borderRadius:'50%',background:s.c,opacity:0.22,animation:'pulse-ring 1.6s ease-out infinite'}}/>}
      <span style={{width:8,height:8,borderRadius:'50%',background:s.c}}/>
    </span>
  );
}
function OwnerTag({owner,role}){
  const t=useT();
  const rn={planner:'Planner',tasker:'Breakdown',coder:'Coding',tester:'Test',reviewer:'Review',summarizer:'Summarizer'};
  return owner==='human'
    ?<span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'1px 7px',borderRadius:5,fontSize:10.5,fontWeight:700,background:t.pl,color:t.p,border:`1px solid ${t.pb}`,flexShrink:0}}>👤 人工</span>

}

/* ─── FLOW NAVIGATOR ─────────────────────────────────────────────── */
function FlowNav({state,setState}){
  const t=useT();
  return(
    <div style={{display:'flex',alignItems:'center',gap:0,padding:'9px 16px',background:t.sb,backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:`1px solid ${t.glb}`,overflowX:'auto',flexShrink:0}}>
      <span style={{fontSize:10.5,fontWeight:700,color:t.txs,letterSpacing:0.5,marginRight:10,flexShrink:0}}>FLOW</span>
      <div style={{display:'flex',alignItems:'center',gap:1}}>
        {FLOW_META.map((m,i)=>{
          const active=state===i+1;const done=state>i+1;
          const accent=m.human?t.p:t.ag;
          return(
            <React.Fragment key={i}>
              {i>0&&<div style={{width:12,height:1.5,background:done?t.ok:active?accent:'rgba(0,0,0,0.09)',transition:'background 0.2s',flexShrink:0}}/>}
              <button onClick={()=>setState(i+1)} title={m.hint} style={{
                display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'3px 7px',
                borderRadius:7,border:'none',cursor:'pointer',
                background:active?(m.human?t.pl:t.agl):'transparent',
                outline:active?`2px solid ${accent}`:'none',outlineOffset:1,
                transition:'all 0.15s',flexShrink:0
              }}>
                <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:done?t.ok:active?accent:'rgba(0,0,0,0.08)',fontSize:9.5,fontWeight:700,color:done||active?'white':t.txs,transition:'all 0.2s'}}>
                  {done?'✓':i+1}
                </div>
                <span style={{fontSize:9.5,fontWeight:active?700:400,color:active?accent:t.txs,whiteSpace:'nowrap'}}>{m.label}</span>
              </button>
            </React.Fragment>
          );
        })}
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:7,paddingLeft:12,flexShrink:0,alignItems:'center'}}>
        <span style={{fontSize:10,color:t.p,fontWeight:600,background:t.pl,border:`1px solid ${t.pb}`,borderRadius:4,padding:'2px 6px'}}>👤 人工</span>
        <span style={{fontSize:10,color:t.ag,fontWeight:600,background:t.agl,border:`1px solid ${t.ag}40`,borderRadius:4,padding:'2px 6px'}}>🤖 Agent</span>
      </div>
    </div>
  );
}

function PlaceholderModal({title,desc,onClose}){const t=useT();return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.2)',backdropFilter:'blur(4px)',zIndex:150,display:'flex',alignItems:'center',justifyContent:'center'}}><Glass style={{width:420,padding:24,animation:'slideUp 0.3s ease both'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h3 style={{fontSize:15,fontWeight:700,color:t.tx}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:t.txs,fontSize:17}}>✕</button></div><div style={{padding:'14px',borderRadius:10,background:'rgba(0,0,0,0.04)',border:'1.5px dashed rgba(0,0,0,0.1)',textAlign:'center',marginBottom:16}}><div style={{fontSize:24,marginBottom:6}}>🚧</div><div style={{fontSize:13,color:t.txm,lineHeight:1.6}}>{desc}</div></div><Btn variant="outline" style={{width:'100%',justifyContent:'center'}} onClick={onClose}>关闭</Btn></Glass></div>);}

function AgentBanner({role,logs=[]}){  
  const t=useT();
  const rn={planner:'Planner Agent',tasker:'Task Breakdown Agent',coder:'Coding Agent',tester:'Test Agent',reviewer:'Review Agent',summarizer:'Summarizer Agent'};
  const[tick,st]=useState(0);const[warn,sw]=useState(false);
  useEffect(()=>{const id=setInterval(()=>st(x=>{if(x+1>=90)sw(true);return x+1;}),1000);return()=>clearInterval(id);},[]);  
  return(
    <div style={{padding:'11px 13px',borderRadius:10,background:t.agl,border:`1px solid ${t.ag}35`,marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:t.ag,animation:'pulse-ring 1.5s ease-out infinite',flexShrink:0}}/>
        <span style={{fontSize:12.5,fontWeight:700,color:t.ag}}>{rn[role]||'Agent'} 运行中</span>
        <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5}}>{warn&&<span style={{fontSize:10,fontWeight:700,color:t.er,background:t.erl,padding:'1px 6px',borderRadius:4,animation:'pulse-ring 1.5s ease-out infinite'}}>⚠ 可能无响应</span>}<span style={{fontSize:10,color:t.txs,fontFamily:'JetBrains Mono,monospace'}}>{tick}s / 90s</span></span>
      </div>
      <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10.5,color:t.txm,lineHeight:1.8}}>
        {logs.map((l,i)=><div key={i} style={{display:'flex',gap:5,opacity:i===logs.length-1?1:0.5}}><span style={{color:t.ag}}>{i===logs.length-1?'▶':'✓'}</span><span>{l}</span></div>)}
        <span style={{color:t.ag,animation:'blink 1s step-end infinite'}}>█</span>
      </div>
    </div>
  );
}

function FileTree({nodes=[],selectedPath='',onSelect=()=>{}}){
  const t=useT();
  const rootDirs=nodes.filter(n=>n.type==='directory').map(n=>n.path);
  const selectedDirs=selectedPath.split('/').slice(0,-1).reduce((acc,_,i,arr)=>[...acc,arr.slice(0,i+1).join('/')],[]);
  const[open,setOpen]=useState(()=>new Set([...rootDirs,...selectedDirs]));
  useEffect(()=>{
    setOpen(prev=>new Set([...prev,...rootDirs,...selectedDirs]));
  },[nodes,selectedPath]);
  if(!nodes.length){
    return <Glass style={{padding:18,color:t.txm,fontSize:13}}>目录为空。</Glass>;
  }
  const toggle=(path)=>setOpen(prev=>{const next=new Set(prev);next.has(path)?next.delete(path):next.add(path);return next;});
  const render=(items,depth=0)=>items.map(n=>{
    const isDir=n.type==='directory';
    const isOpen=open.has(n.path);
    const active=selectedPath===n.path;
    const childCount=n.children?.length||0;
    return(
      <div key={n.path}>
        <button onClick={()=>isDir?toggle(n.path):onSelect(n.path)} title={n.path} style={{
          width:'100%',height:26,display:'flex',alignItems:'center',gap:5,padding:'0 7px',paddingLeft:6+depth*14,
          borderRadius:6,fontFamily:'JetBrains Mono,monospace',fontSize:11.5,color:t.txm,border:'none',
          background:active?t.pl:'transparent',cursor:'pointer',textAlign:'left',overflow:'hidden',
        }}>
          <span style={{width:13,flexShrink:0,color:isDir?t.txs:'transparent',fontSize:10,transform:isDir&&isOpen?'rotate(90deg)':'none',transition:'transform 0.12s ease'}}>▶</span>
          <span style={{width:15,flexShrink:0,color:isDir?t.p:t.txs,fontSize:13}}>{isDir?(isOpen?'📂':'📁'):'📄'}</span>
          <span style={{minWidth:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:isDir?t.tx:active?t.p:t.txm,fontWeight:isDir?700:active?700:500}}>{n.name}</span>
          {isDir&&childCount>0&&<span style={{marginLeft:'auto',fontSize:9.5,color:t.txs,flexShrink:0}}>{childCount}</span>}
        </button>
        {isDir&&isOpen&&childCount>0?render(n.children,depth+1):null}
      </div>
    );
  });
  return <div style={{padding:'6px 0',userSelect:'none'}}>{render(nodes)}</div>;
}
function RealFlowNav({steps=[],active,onSelect}){
  const t=useT();
  const labels=['空状态','创建向导','PRD确认','生成计划','审批计划','任务拆解','代码实现','运行测试','代码审查','最终审查','PR完成'];
  const realByNode={3:2,4:3,5:3,6:4,7:5,8:6,9:7,10:8,11:9};
  const completed=new Set(steps.filter(s=>s.status==='completed').map(s=>s.position));
  const activePos=active?.position;
  return(
    <div style={{display:'flex',alignItems:'center',gap:0,padding:'9px 16px',background:t.sb,backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:`1px solid ${t.glb}`,overflowX:'auto',flexShrink:0}}>
      <span style={{fontSize:10.5,fontWeight:700,color:t.txs,letterSpacing:0.5,marginRight:10,flexShrink:0}}>FLOW</span>
      {labels.map((label,i)=>{
        const node=i+1;
        const realPos=realByNode[node];
        const step=steps.find(s=>s.position===realPos);
        const done=node<=2||completed.has(realPos)||completed.has(realPos-1)&&node===5;
        const activeNode=realPos?step?.id===active?.id||realPos===activePos&&node!==5:false;
        const human=[3,5,10].includes(node);
        const accent=human?t.p:t.ag;
        return(
          <React.Fragment key={node}>
            {i>0&&<div style={{width:12,height:1.5,background:done?t.ok:activeNode?accent:'rgba(0,0,0,0.09)',flexShrink:0}}/>}
            <button onClick={()=>step&&onSelect(step.id)} disabled={!step&&node>2} title={label} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'3px 7px',borderRadius:7,border:'none',cursor:step||node<=2?'pointer':'not-allowed',background:activeNode?(human?t.pl:t.agl):'transparent',outline:activeNode?`2px solid ${accent}`:'none',outlineOffset:1,opacity:step||node<=2?1:0.55,flexShrink:0}}>
              <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:done?t.ok:activeNode?accent:'rgba(0,0,0,0.08)',fontSize:9.5,fontWeight:700,color:done||activeNode?'white':t.txs}}>{done?'✓':node}</div>
              <span style={{fontSize:9.5,fontWeight:activeNode?700:400,color:activeNode?accent:t.txs,whiteSpace:'nowrap'}}>{label}</span>
            </button>
          </React.Fragment>
        );
      })}
      <div style={{marginLeft:'auto',display:'flex',gap:7,paddingLeft:12,flexShrink:0,alignItems:'center'}}>
        <span style={{fontSize:10,color:t.p,fontWeight:600,background:t.pl,border:`1px solid ${t.pb}`,borderRadius:4,padding:'2px 6px'}}>👤 人工</span>
        <span style={{fontSize:10,color:t.ag,fontWeight:600,background:t.agl,border:`1px solid ${t.ag}40`,borderRadius:4,padding:'2px 6px'}}>🤖 Agent</span>
      </div>
    </div>
  );
}

function parentPath(){
  try{return window.parent.location.pathname;}catch{return window.location.pathname;}
}
function workspaceSlugFromPath(){
  const match=parentPath().match(/^\/w\/([^/]+)/);
  return match?decodeURIComponent(match[1]):'';
}
function pushParentPath(path){
  try{
    window.parent.history.pushState(null,'',path);
  }catch{}
}
function logoutParent(){
  try{
    window.parent.localStorage.removeItem('aww-auth');
    window.parent.location.href='/login';
  }catch{
    localStorage.removeItem('aww-auth');
    window.location.href='/login';
  }
}
function authToken(){
  try{
    const raw=window.parent.localStorage.getItem('aww-auth')||localStorage.getItem('aww-auth');
    return raw?JSON.parse(raw)?.state?.token:null;
  }catch{return null;}
}
function setAuthToken(token){
  try{
    const storage=window.parent.localStorage||localStorage;
    const raw=storage.getItem('aww-auth');
    if(!raw)return;
    const parsed=JSON.parse(raw);
    parsed.state={...(parsed.state||{}),token};
    storage.setItem('aww-auth',JSON.stringify(parsed));
  }catch{}
}
function authUser(){
  try{
    const raw=window.parent.localStorage.getItem('aww-auth')||localStorage.getItem('aww-auth');
    return raw?JSON.parse(raw)?.state?.user:null;
  }catch{return null;}
}
async function apiJson(path,opts={}){
  const tk=authToken();
  const res=await fetch(path,{...opts,credentials:'include',headers:{Accept:'application/json',...(opts.body?{'Content-Type':'application/json'}:{}),...(tk?{Authorization:`Bearer ${tk}`}:{})}});
  if(res.status===401&&path!=='/api/v1/auth/refresh'){
    const refresh=await fetch('/api/v1/auth/refresh',{method:'POST',credentials:'include',headers:{Accept:'application/json'}});
    if(refresh.ok){
      const refreshed=await refresh.json();
      if(refreshed.accessToken){
        setAuthToken(refreshed.accessToken);
        return apiJson(path,opts);
      }
    }
  }
  if(!res.ok)throw new Error(`${res.status} ${path}`);
  return res.status===204?{}:res.json();
}
function fmtDate(v){
  if(!v)return '—';
  const d=new Date(v);
  if(Number.isNaN(d.getTime()))return '—';
  return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function stepOwner(step){return step.owner_type==='human'||step.owner_type==='approval_gate'?'human':'agent';}
function slugifyName(name){
  const slug=name.trim().toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,48);
  return slug||`workspace-${Date.now().toString(36)}`;
}
function githubRepoNameFromWorkspace(name){
  const repo=name.trim().replace(/[^A-Za-z0-9._-]+/g,'-').replace(/^-+|-+$/g,'').slice(0,96);
  return repo||slugifyName(name);
}

  const[status,setStatus]=useState({});
  const[testing,setTesting]=useState(false);
  const[test,setTest]=useState(null);
  const[saving,setSaving]=useState(false);
  const[saveMsg,setSaveMsg]=useState('');
  const token=()=>{
    return authToken();
  };
  const api=(path,opts={})=>{
    const tk=token();
    return fetch(path,{...opts,headers:{Accept:'application/json',...(opts.body?{'Content-Type':'application/json'}:{}),...(tk?{Authorization:`Bearer ${tk}`}:{})}}).then(r=>r.json());
  };
  const refresh=()=>api('/api/v1/agent-cli/status').then(j=>setStatus(Object.fromEntries((j.data||[]).map(s=>[s.id,s])))).catch(()=>setStatus({}));
  useEffect(()=>{refresh();},[]);
  useEffect(()=>{
    if(workspace?.preferredProvider)setSel(workspace.preferredProvider);
  },[workspace?.id,workspace?.preferredProvider]);
  const save=async()=>{
    setSaving(true);setSaveMsg('');
    localStorage.setItem('aww-agent-cli',sel);
    try{
      if(workspace?.id)await api(`/api/v1/workspaces/${workspace.id}`,{method:'PATCH',body:JSON.stringify({preferredProvider:sel})});
      setSaveMsg('已保存');
    }catch{setSaveMsg('已保存到本地');}
    setSaving(false);
  };
  const runTest=async()=>{
    setTesting(true);setTest(null);
    try{
      const j=await api('/api/v1/agent-cli/test',{method:'POST',body:JSON.stringify({agent:sel})});
      setTest(j.data||{ok:false,error:'测试失败'});
    }catch(e){setTest({ok:false,error:e.message||'测试请求失败',output:''});}
    setTesting(false);
  };
  return(
    <div style={{flex:1,overflow:'auto',padding:'24px 30px'}}>
      <div style={{maxWidth:820}}>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,color:t.txs,fontWeight:700,letterSpacing:0.5,marginBottom:4}}>{workspace?.slug||'WORKSPACE'}</div>
          <h1 style={{fontSize:22,fontWeight:700,color:t.tx,letterSpacing:-0.5}}>设置</h1>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
          {[{l:'工作区名称',v:workspace?.name||'—'},{l:'仓库',v:workspace?.githubRepoUrl||'未连接仓库'},{l:'默认分支',v:workspace?.defaultBranch||'main'},{l:'Workspace 位置',v:workspace?.storagePath||'—'}].map((item,i)=>(
            <Glass key={i} style={{padding:'14px 16px'}}>
              <div style={{fontSize:9.5,fontWeight:700,color:t.txs,letterSpacing:0.5,marginBottom:4}}>{item.l.toUpperCase()}</div>
              <div style={{fontSize:14,color:t.tx,fontFamily:i===3?'JetBrains Mono,monospace':'DM Sans,sans-serif',wordBreak:'break-all'}}>{item.v}</div>
            </Glass>
          ))}
        </div>
        <Glass style={{padding:18}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,marginBottom:14}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:t.tx}}>AI Agent CLI</div>
              <div style={{fontSize:12,color:t.txm,marginTop:3}}>选择当前工作区使用的 Agent，并测试后端环境中的 CLI 是否可用。</div>
            </div>
            <Btn variant="outline" size="sm" onClick={refresh}>刷新状态</Btn>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,minmax(0,1fr))',gap:9}}>
            {agents.map(a=>{
              const s=status[a.id]||{};
              const active=sel===a.id;
              return(
                <button key={a.id} onClick={()=>{setSel(a.id);setTest(null);}} style={{minHeight:118,textAlign:'left',padding:12,borderRadius:10,border:`1.5px solid ${active?t.pb:'rgba(0,0,0,0.07)'}`,background:active?t.pl:'rgba(255,255,255,0.42)',cursor:'pointer',boxShadow:active?`0 6px 22px ${t.p}18`:'none'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:6,marginBottom:8}}>
                    <span style={{fontSize:13,fontWeight:800,color:active?t.p:t.tx}}>{a.name}</span>
                    <span style={{width:8,height:8,borderRadius:'50%',background:s.installed?t.ok:t.er,boxShadow:`0 0 0 3px ${s.installed?t.okl:t.erl}`}}/>
                  </div>
                  <div style={{fontSize:10.5,color:t.txs,fontFamily:'JetBrains Mono,monospace',marginBottom:6}}>{a.id}</div>
                  <div style={{fontSize:11,color:t.txm,lineHeight:1.35}}>{a.desc}</div>
                  <div style={{fontSize:10,color:s.installed?t.ok:t.er,fontWeight:700,marginTop:8}}>{s.installed?'已安装':'未检测到'}</div>
                </button>
              );
            })}
          </div>
          <div style={{marginTop:14,padding:13,borderRadius:11,background:'rgba(255,255,255,0.38)',border:'1px solid rgba(0,0,0,0.06)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12}}>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:t.tx}}>当前选择：{agents.find(a=>a.id===sel)?.name}</div>
              <div style={{fontSize:11,color:t.txs,fontFamily:'JetBrains Mono,monospace',marginTop:3}}>{status[sel]?.version||status[sel]?.error||'尚未检测版本'}</div>
              {saveMsg&&<div style={{fontSize:11,color:t.ok,fontWeight:700,marginTop:5}}>{saveMsg}</div>}
            </div>
            <div style={{display:'flex',gap:8,flexShrink:0}}>
              <Btn variant="outline" onClick={runTest} disabled={testing}>{testing?'测试中…':'测试 Agent'}</Btn>
              <Btn onClick={save} disabled={saving}>{saving?'保存中…':'保存配置'}</Btn>
            </div>
          </div>
          {test&&(
            <div style={{marginTop:12,padding:13,borderRadius:11,background:test.ok?t.okl:t.erl,border:`1px solid ${test.ok?t.ok+'45':t.er+'45'}`}}>
              <div style={{fontSize:12,fontWeight:800,color:test.ok?t.ok:t.er,marginBottom:6}}>{test.ok?'Agent 测试通过':'Agent 测试失败'}</div>
              <div style={{fontSize:10.5,color:t.txm,marginBottom:8}}>Stage: {test.stage||'request'} · Command: {test.command||sel} · {test.durationMs||0}ms</div>
              <pre style={{maxHeight:150,overflow:'auto',whiteSpace:'pre-wrap',fontSize:10.5,lineHeight:1.55,color:t.tx,background:'rgba(255,255,255,0.55)',border:'1px solid rgba(0,0,0,0.06)',borderRadius:8,padding:10,fontFamily:'JetBrains Mono,monospace'}}>{test.output||test.error||'No output'}</pre>
            </div>
          )}
        </Glass>
      </div>
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────── */
function App(){
  const stored=JSON.parse(localStorage.getItem('aww-tw2')||'null')||TWEAK_DEFAULTS;
  const[tweaks,setTweaksRaw]=useState(stored);
  const[screen,setScreen]=useState(()=>parentPath().includes('/settings')?'settings':parentPath().startsWith('/w/')?'workspace':'workspaces');
  const[showWizard,sSW]=useState(false);
  const[flowState,setFlowState]=useState(()=>parseInt(localStorage.getItem('aww-flow2')||'5'));
  const[twVis,sTWV]=useState(false);
  const[workspaces,setWorkspaces]=useState([]);
  const[selectedWorkspaceId,setSelectedWorkspaceId]=useState(localStorage.getItem('aww-selected-workspace')||'');
  const[runsByWorkspace,setRunsByWorkspace]=useState({});
  const[activeRun,setActiveRun]=useState(null);
  const[artifactContent,setArtifactContent]=useState({});
  const[artifactMeta,setArtifactMeta]=useState({});
  const[codeTree,setCodeTree]=useState([]);
  const[codeTreeError,setCodeTreeError]=useState('');
  const[codeFileContent,setCodeFileContent]=useState({});
  const[gitInfo,setGitInfo]=useState(null);
  const[auditEvents,setAuditEvents]=useState([]);
  const[loadingData,setLoadingData]=useState(true);
  const[repairingRun,setRepairingRun]=useState(false);
  const[toast,sToast]=useState(null);
  const[artifactEdit,setArtifactEdit]=useState({open:false,role:'PRD',targetPosition:2,title:'',heading:'',description:'',content:'',loading:false,submitting:false});

  const setTweaks=fn=>{setTweaksRaw(tw=>{const next=typeof fn==='function'?fn(tw):fn;localStorage.setItem('aww-tw2',JSON.stringify(next));window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');return next;});};
  useEffect(()=>{localStorage.setItem('aww-flow2',String(flowState));},[flowState]);
  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode')sTWV(true);
      if(e.data?.type==='__deactivate_edit_mode')sTWV(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);
  const activeWorkspace=workspaces.find(w=>w.id===selectedWorkspaceId)||workspaces[0];
  const repairOnboardingRun=async(detail)=>{
    const steps=(detail?.steps||[]).slice().sort((a,b)=>a.position-b.position);
    const createStep=steps.find(s=>s.position===1);
    const prdStep=steps.find(s=>s.position===2);
    const hasPrd=(prdStep?.output_artifact_ids||[]).length>0;
    if(!createStep||!prdStep||!hasPrd)return detail;
    const needsCreate=createStep.status!=='completed';
    const needsPrd=prdStep.status!=='completed';
    if(!needsCreate&&!needsPrd)return detail;
    setRepairingRun(true);
    try{
      if(needsCreate)await apiJson(`/api/v1/steps/${createStep.id}/decision`,{method:'POST',body:JSON.stringify({action:'approve',comment:'Auto-complete workspace creation after onboarding'})});
      if(needsPrd)await apiJson(`/api/v1/steps/${prdStep.id}/decision`,{method:'POST',body:JSON.stringify({action:'approve',comment:'Auto-complete PRD import after onboarding'})});
      const refreshed=await apiJson(`/api/v1/runs/${detail.id}`);
      return refreshed.data;
    }finally{
      setRepairingRun(false);
    }
  };
  const loadRuns=async(wsList)=>{
    const pairs=await Promise.all(wsList.map(async w=>{
      try{
        const j=await apiJson(`/api/v1/workspaces/${w.id}/runs`);
        return [w.id,j.data||[]];
      }catch{return [w.id,[]];}
    }));
    const next=Object.fromEntries(pairs);
    setRunsByWorkspace(next);
    const pathSlug=workspaceSlugFromPath();
    const storedId=localStorage.getItem('aww-selected-workspace')||selectedWorkspaceId;
    const ws=wsList.find(w=>pathSlug&&(w.slug===pathSlug||w.name===pathSlug||w.id===pathSlug))||wsList.find(w=>w.id===(storedId||wsList[0]?.id))||wsList[0];
    if(ws&&ws.id!==selectedWorkspaceId){
      setSelectedWorkspaceId(ws.id);
      localStorage.setItem('aww-selected-workspace',ws.id);
    }
    const latest=(next[ws?.id]||[]).slice().sort((a,b)=>new Date(b.updated_at||b.created_at||0)-new Date(a.updated_at||a.created_at||0))[0];
    if(latest){
      const d=await apiJson(`/api/v1/runs/${latest.id}`);
      setActiveRun(await repairOnboardingRun(d.data));
    }else setActiveRun(null);
  };
  const loadData=async()=>{
    setLoadingData(true);
    try{
      const j=await apiJson('/api/v1/workspaces');
      const ws=j.data||[];
      setWorkspaces(ws);
      const pathSlug=workspaceSlugFromPath();
      const pathWorkspace=ws.find(w=>pathSlug&&(w.slug===pathSlug||w.name===pathSlug||w.id===pathSlug));
      if(pathWorkspace){
        setSelectedWorkspaceId(pathWorkspace.id);
        localStorage.setItem('aww-selected-workspace',pathWorkspace.id);
      }else if(ws.length&&!selectedWorkspaceId){
        setSelectedWorkspaceId(ws[0].id);
        localStorage.setItem('aww-selected-workspace',ws[0].id);
      }
      await loadRuns(ws);
    }catch{
      setWorkspaces([]);setRunsByWorkspace({});setActiveRun(null);
    }
    setLoadingData(false);
  };
  useEffect(()=>{loadData();},[]);
  const activeArtifactIds=(activeRun?.steps||[]).flatMap(s=>s.output_artifact_ids||[]);
  useEffect(()=>{
    const ids=activeArtifactIds;
    ids.forEach(id=>{
      if(!artifactMeta[id])apiJson(`/api/v1/artifacts/${id}`).then(j=>setArtifactMeta(c=>({...c,[id]:j.data}))).catch(()=>{});
      if(artifactContent[id])return;
      apiJson(`/api/v1/artifacts/${id}/content`).then(j=>setArtifactContent(c=>({...c,[id]:j.data?.content||''}))).catch(()=>{});
    });
  },[activeRun?.id,activeArtifactIds.join('|')]);
  useEffect(()=>{
    if(!activeRun?.id){setAuditEvents([]);return;}
    apiJson(`/api/v1/runs/${activeRun.id}/audit`).then(j=>setAuditEvents(j.data||[])).catch(()=>setAuditEvents([]));
  },[activeRun?.id,activeRun?.updated_at,activeArtifactIds.join('|')]);
  const codeTreeRefreshKey=(activeRun?.steps||[]).map(s=>[
    s.id,
    s.status,
    s.updated_at||s.updatedAt||'',
    (s.output_artifact_ids||[]).join(',')
  ].join(':')).join('|');
  useEffect(()=>{
    if(!activeWorkspace?.id){setCodeTree([]);setCodeTreeError('');setCodeFileContent({});return;}
    setCodeFileContent({});
    setCodeTreeError('');
    apiJson(`/api/v1/workspaces/${activeWorkspace.id}/files?area=code`).then(j=>{
      setCodeTree(j.data||[]);
      setCodeTreeError('');
    }).catch(e=>{
      setCodeTree([]);
      setCodeTreeError(e?.message||'代码目录加载失败');
    });
    apiJson(`/api/v1/workspaces/${activeWorkspace.id}/git`).then(j=>setGitInfo(j.data||null)).catch(()=>setGitInfo(null));
  },[activeWorkspace?.id,activeRun?.id,codeTreeRefreshKey]);
  const readCodeFile=async(path)=>{
    if(!activeWorkspace?.id||!path)return;
    if(codeFileContent[path]!==undefined)return;
    setCodeFileContent(prev=>({...prev,[path]:'Loading file...'}));
    try{
      const j=await apiJson(`/api/v1/workspaces/${activeWorkspace.id}/files/content?area=code&path=${encodeURIComponent(path)}`);
      setCodeFileContent(prev=>({...prev,[path]:j.data?.content||''}));
    }catch(e){
      setCodeFileContent(prev=>({...prev,[path]:e?.message||'Failed to load file'}));
    }
  };
  const selectWorkspace=async(id)=>{
    setSelectedWorkspaceId(id);localStorage.setItem('aww-selected-workspace',id);setScreen('workspace');pushParentPath('/w/'+(workspaces.find(w=>w.id===id)?.slug||id));
    const latest=(runsByWorkspace[id]||[]).slice().sort((a,b)=>new Date(b.updated_at||b.created_at||0)-new Date(a.updated_at||a.created_at||0))[0];
    if(latest){const d=await apiJson(`/api/v1/runs/${latest.id}`);setActiveRun(await repairOnboardingRun(d.data));}else setActiveRun(null);
  };
  const reloadActiveRun=async()=>{
    if(!activeRun?.id)return;
    const d=await apiJson(`/api/v1/runs/${activeRun.id}`);
    const repaired=await repairOnboardingRun(d.data);
    setActiveRun(repaired);
    const wsId=repaired.workspace_id;
    if(wsId){
      const j=await apiJson(`/api/v1/workspaces/${wsId}/runs`);
      setRunsByWorkspace(prev=>({...prev,[wsId]:j.data||[]}));
    }
  };
  useEffect(()=>{
    if(!activeRun?.id)return;
    const shouldPoll=activeRun.status==='running'||(activeRun.steps||[]).some(s=>['running','retrying'].includes(s.status));
    if(!shouldPoll)return;
    const timer=setInterval(()=>{reloadActiveRun().catch(()=>{});},3000);
    return()=>clearInterval(timer);
  },[activeRun?.id,activeRun?.status,JSON.stringify((activeRun?.steps||[]).map(s=>[s.id,s.status]))]);
  const editConfig={
    PRD:{role:'PRD',targetPosition:2,title:'PRD（人工修订）',heading:'修改 PRD 并重新执行',description:'修改后将从“生成工程计划”步骤重新开始执行'},
    PLAN:{role:'PLAN',targetPosition:3,title:'工程计划（人工修订）',heading:'修改工程计划并重新执行',description:'修改后将从“任务拆解”步骤重新开始执行'},
  };
  const openArtifactEdit=async(role,targetPosition)=>{
    const cfg=editConfig[role]||editConfig.PRD;
    const effectiveCfg={...cfg,...(targetPosition?{targetPosition}: {})};
    setArtifactEdit(e=>({...e,...effectiveCfg,open:true,content:'',loading:true,submitting:false}));
    try{
      const steps=(activeRun?.steps||[]).slice().sort((a,b)=>a.position-b.position);
      const sourceStep=steps
        .filter(s=>s.position<=effectiveCfg.targetPosition&&(s.output_artifact_roles||[]).includes(effectiveCfg.role)&&(s.output_artifact_ids||[]).length)
        .slice(-1)[0];
      const artId=(sourceStep?.output_artifact_ids||[])[0];
      if(artId){
        const j=await apiJson(`/api/v1/artifacts/${artId}/content`);
        setArtifactEdit(e=>({...e,content:j.data?.content||'',loading:false}));
      }else{
        setArtifactEdit(e=>({...e,content:'',loading:false}));
      }
    }catch{
      setArtifactEdit(e=>({...e,loading:false}));
    }
  };
  const submitArtifactEdit=async()=>{
    if(!activeRun?.id)return;
    setArtifactEdit(e=>({...e,submitting:true}));
    try{
      await apiJson(`/api/v1/runs/${activeRun.id}/rewind`,{method:'POST',body:JSON.stringify({target_position:artifactEdit.targetPosition,role:artifactEdit.role,content_inline:artifactEdit.content,title:artifactEdit.title})});
      sToast(`✓ ${artifactEdit.role==='PRD'?'PRD':'工程计划'} 已修订，工作流已重新执行`);
      setArtifactContent({});
      setArtifactMeta({});
      setArtifactEdit(e=>({...e,open:false,content:'',loading:false,submitting:false}));
      await reloadActiveRun();
    }catch(e){
      sToast('操作失败：'+(e?.message||'未知错误'));
      setArtifactEdit(e=>({...e,submitting:false}));
    }
  };
  const decideStep=async(stepId,action)=>{
    const msgs={approve:'✓ 已批准，工作流继续',reject:'✕ 已拒绝，工作流终止',request_changes:'↺ 已发送修改请求，步骤重置为等待中',rerun:'↺ 已重新执行步骤',edit:'✏️ 编辑已提交',take_over:'👤 已接管步骤'};
    try{
      await apiJson(`/api/v1/steps/${stepId}/decision`,{method:'POST',body:JSON.stringify({action,comment:`${action} from workspace UI`})});
      await reloadActiveRun();
      sToast(msgs[action]||'操作成功');
    }catch(e){
      sToast('操作失败：'+(e?.message||'未知错误'));
    }
  };
  const rerunStep=async(stepId)=>{
    try{
      await apiJson(`/api/v1/steps/${stepId}/rerun`,{method:'POST',body:JSON.stringify({reason:'Retry failed step from workspace UI'})});
      await reloadActiveRun();
      sToast('↻ 已重新触发步骤执行');
    }catch(e){
      sToast('重试失败：'+(e?.message||'未知错误'));
    }
  };
  const uploadPrdForStep=async(stepId,file)=>{
    if(!file.name.toLowerCase().endsWith('.md'))throw new Error('当前只支持上传 .md 文件');
    const content=await file.text();
    const art=await apiJson('/api/v1/artifacts',{method:'POST',body:JSON.stringify({role:'PRD',step_id:stepId,title:file.name,content_inline:content})});
    await apiJson(`/api/v1/artifacts/${art.data.id}/commit`,{method:'POST'});
    await apiJson(`/api/v1/steps/${stepId}/decision`,{method:'POST',body:JSON.stringify({action:'approve',comment:'PRD uploaded from Import PRD step',edited_artifact_id:art.data.id})});
    await reloadActiveRun();
  };
  const createRun=async()=>{
    if(!activeWorkspace)return;
    const j=await apiJson(`/api/v1/workspaces/${activeWorkspace.id}/runs`,{method:'POST',body:JSON.stringify({template_id:'builtin-9step'})});
    setActiveRun(j.data);
    await loadRuns(workspaces);
  };
  const createWorkspaceFromWizard=async(data)=>{
    const slugBase=slugifyName(data.name);
    const body={name:data.name,slug:slugBase,preferredProvider:localStorage.getItem('aww-agent-cli')||'codex',...(data.repoUrl?{githubRepoUrl:data.repoUrl}:{})};
    let ws;
    try{
      const created=await apiJson('/api/v1/workspaces',{method:'POST',body:JSON.stringify(body)});
      ws=created.data;
    }catch(e){
      const created=await apiJson('/api/v1/workspaces',{method:'POST',body:JSON.stringify({...body,slug:`${slugBase}-${Date.now().toString(36).slice(-4)}`})});
      ws=created.data;
    }
    const runCreated=await apiJson(`/api/v1/workspaces/${ws.id}/runs`,{method:'POST',body:JSON.stringify({template_id:'builtin-9step'})});
    const importStep=(runCreated.data.steps||[]).find(s=>s.position===2)||runCreated.data.steps?.[0];
    if(importStep&&data.prd){
      const art=await apiJson('/api/v1/artifacts',{method:'POST',body:JSON.stringify({role:'PRD',step_id:importStep.id,title:`${data.name} PRD`,content_inline:data.prd})});
      await apiJson(`/api/v1/artifacts/${art.data.id}/commit`,{method:'POST'});
    }
    const createStep=(runCreated.data.steps||[]).find(s=>s.position===1);
    const prdStep=(runCreated.data.steps||[]).find(s=>s.position===2);
    if(createStep)await apiJson(`/api/v1/steps/${createStep.id}/decision`,{method:'POST',body:JSON.stringify({action:'approve',comment:'Workspace created from onboarding wizard'})});
    if(prdStep&&data.prd)await apiJson(`/api/v1/steps/${prdStep.id}/decision`,{method:'POST',body:JSON.stringify({action:'approve',comment:'PRD imported from onboarding wizard'})});
    setSelectedWorkspaceId(ws.id);
    localStorage.setItem('aww-selected-workspace',ws.id);
    setScreen('workspace');
    pushParentPath('/w/'+ws.slug);
    await loadData();
    const detail=await apiJson(`/api/v1/runs/${runCreated.data.id}`);
    setActiveRun(detail.data);
  };

  const t=TH[tweaks.theme]||TH.amber;
  const isEmpty=flowState<=2&&screen==='workspace';
  const goWorkspaces=()=>{setScreen('workspaces');pushParentPath('/workspaces');};
  const goProject=()=>{setScreen('workspace');pushParentPath('/w/'+(activeWorkspace?.slug||'workspace'));};

  return(
    <TC.Provider value={t}>
      <div style={{width:'100%',height:'100%',display:'flex',background:t.bgg,fontFamily:'DM Sans,sans-serif',color:t.tx,overflow:'hidden'}}>
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,backgroundImage:`radial-gradient(ellipse at 15% 15%,${t.p}10 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,${t.ag}0a 0%,transparent 55%)`}}/>
        <div style={{position:'relative',zIndex:1,display:'flex',flex:1,overflow:'hidden'}}>
          {!isEmpty&&<Sidebar screen={screen} setScreen={setScreen} onLogo={goWorkspaces} onProject={goProject} onLogout={logoutParent} workspace={activeWorkspace} run={activeRun}/>}
          {isEmpty
            ? <EmptyState onStart={()=>sSW(true)}/>
            : screen==='workspaces'
              ? <WorkspacesView workspaces={workspaces} runsByWorkspace={runsByWorkspace} loading={loadingData} onOpen={selectWorkspace} onCreate={()=>sSW(true)}/>
              : screen==='workspace'
              ? <RealWorkspaceView workspace={activeWorkspace} run={activeRun} artifactContent={artifactContent} artifactMeta={artifactMeta} codeTree={codeTree} codeTreeError={codeTreeError} codeFileContent={codeFileContent} gitInfo={gitInfo} onCreateRun={createRun} onDecision={decideStep} onRerunStep={rerunStep} onUploadPrd={uploadPrdForStep} onReadCodeFile={readCodeFile} repairing={repairingRun} onRequestArtifactEdit={openArtifactEdit}/>
              : screen==='artifacts'?<ArtifactsView run={activeRun} artifactMeta={artifactMeta} artifactContent={artifactContent}/>
              : screen==='audit'?<AuditView run={activeRun} auditEvents={auditEvents}/>
              : <SettingsView workspace={activeWorkspace}/>
          }
        </div>
        {artifactEdit.open&&(
          <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,0.55)',display:'flex',alignItems:'center',justifyContent:'center'}} onClick={e=>e.target===e.currentTarget&&setArtifactEdit(x=>({...x,open:false}))}>
            <div style={{background:t.bg,borderRadius:14,width:'min(720px,90vw)',maxHeight:'80vh',display:'flex',flexDirection:'column',boxShadow:'0 8px 40px rgba(0,0,0,0.3)',overflow:'hidden'}}>
              <div style={{padding:'18px 22px',borderBottom:`1px solid ${t.glb}`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:700,fontSize:15,color:t.tx}}>{artifactEdit.heading}</div>
                  <div style={{fontSize:12,color:t.txm,marginTop:3}}>{artifactEdit.description}</div>
                </div>
                <button onClick={()=>setArtifactEdit(x=>({...x,open:false}))} style={{background:'none',border:'none',cursor:'pointer',fontSize:20,color:t.txm,padding:'0 4px'}}>✕</button>
              </div>
              <div style={{flex:1,overflow:'hidden',position:'relative',minHeight:200}}>
                {artifactEdit.loading
                  ?<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:t.txm,fontSize:13}}>加载内容…</div>
                  :<textarea
                    style={{width:'100%',height:'100%',minHeight:300,resize:'none',border:'none',outline:'none',padding:'16px 20px',fontFamily:'JetBrains Mono,monospace',fontSize:13,lineHeight:1.7,background:t.bg,color:t.tx,boxSizing:'border-box'}}
                    value={artifactEdit.content}
                    onChange={e=>setArtifactEdit(x=>({...x,content:e.target.value}))}
                    placeholder={`在此输入 ${artifactEdit.role} 内容…`}
                    spellCheck={false}
                    autoFocus
                  />
                }
              </div>
              <div style={{padding:'14px 22px',borderTop:`1px solid ${t.glb}`,display:'flex',gap:10,justifyContent:'flex-end'}}>
                <Btn onClick={()=>setArtifactEdit(x=>({...x,open:false}))} disabled={artifactEdit.submitting}>取消</Btn>
                <Btn variant="primary" onClick={submitArtifactEdit} disabled={artifactEdit.loading||artifactEdit.submitting||!artifactEdit.content.trim()}>
                  {artifactEdit.submitting?'提交中…':'提交修订并重新执行'}
                </Btn>
              </div>
            </div>
          </div>
        )}
        {toast&&<Toast msg={toast} onDone={()=>sToast(null)}/>}
        {showWizard&&<Wizard onClose={()=>sSW(false)} onComplete={async(data)=>{await createWorkspaceFromWizard(data);setFlowState(3);sSW(false);}}/>}
        <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} vis={twVis}/>
      </div>
    </TC.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
