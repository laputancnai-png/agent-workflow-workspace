/* ─── LOGO ───────────────────────────────────────────────────────── */
function Logo({size=32,showText=true}){
  const t=useT();
  const r=size*0.135,cx=size*0.12,cy=size*0.5,mx=size*0.5,my=size*0.5,rx=size*0.88,ry=size*0.5;
  return(
    <div style={{display:'flex',alignItems:'center',gap:size*0.28}}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
        <line x1={cx+r} y1={cy} x2={mx-r*1.5} y2={my} stroke={t.p} strokeWidth={size*0.044} strokeLinecap="round" opacity="0.4"/>
        <line x1={mx+r*1.5} y1={my} x2={rx-r} y2={ry} stroke={t.p} strokeWidth={size*0.044} strokeLinecap="round" opacity="0.4"/>
        <circle cx={cx} cy={cy} r={r} fill={t.agl} stroke={t.ag} strokeWidth={size*0.048}/>
        <circle cx={mx} cy={my} r={r*1.38} fill={t.p}/>
        <circle cx={mx} cy={my-r*0.28} r={r*0.44} fill={t.pt} opacity="0.95"/>
        <path d={`M${mx-r*0.68} ${my+r*0.55} Q${mx-r*0.45} ${my+r*0.08} ${mx} ${my+r*0.08} Q${mx+r*0.45} ${my+r*0.08} ${mx+r*0.68} ${my+r*0.55}`} fill={t.pt} opacity="0.95"/>
        <circle cx={rx} cy={ry} r={r} fill={t.okl} stroke={t.ok} strokeWidth={size*0.048}/>
        <path d={`M${rx-r*0.48} ${ry} L${rx-r*0.08} ${ry+r*0.42} L${rx+r*0.52} ${ry-r*0.46}`} stroke={t.ok} strokeWidth={size*0.058} strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      </svg>
      {showText&&<span style={{fontWeight:700,fontSize:size*0.44,letterSpacing:-0.5,color:t.tx,lineHeight:1}}>AWW</span>}
    </div>
  );
}

  const t=useT();const[h,sh]=useState(false);
  const S={sm:{padding:'5px 11px',fontSize:12},md:{padding:'8px 16px',fontSize:13.5},lg:{padding:'11px 24px',fontSize:15}};
  const V={
    primary:{bg:h?t.ph:t.p,color:t.pt,brd:'none',shd:`0 2px 12px ${t.p}50`},
    ghost:{bg:h?t.pl:'transparent',color:t.p,brd:`1px solid ${h?t.pb:'transparent'}`},
    outline:{bg:h?'rgba(0,0,0,0.04)':'transparent',color:t.txm,brd:'1px solid rgba(0,0,0,0.11)'},
    danger:{bg:h?t.erl:'transparent',color:t.er,brd:`1px solid ${h?t.er:'rgba(0,0,0,0.11)'}`},
    agent:{bg:h?t.agl:'transparent',color:t.ag,brd:`1px solid ${h?t.ag:'rgba(0,0,0,0.11)'}`},
    success:{bg:h?t.okl:t.ok,color:'#fff',brd:'none',shd:`0 2px 12px ${t.ok}50`},
    icon:{bg:h?'rgba(0,0,0,0.07)':'rgba(0,0,0,0.04)',color:t.txm,brd:'1px solid rgba(0,0,0,0.08)'},
  };
  const v=V[variant]||V.primary;
  return(
    <button onMouseEnter={()=>sh(true)} onMouseLeave={()=>sh(false)} onClick={onClick} disabled={disabled} style={{
      display:'inline-flex',alignItems:'center',justifyContent:'center',gap:5,
      borderRadius:9,cursor:disabled?'not-allowed':'pointer',
      fontFamily:'DM Sans,sans-serif',fontWeight:600,letterSpacing:-0.1,
      transition:'all 0.13s ease',opacity:disabled?0.45:1,
      background:v.bg,color:v.color,border:v.brd||'none',boxShadow:v.shd||'none',
      ...S[size],...style
    }}>{children}</button>
  );
}
function Badge({children,color='gray'}){
  const t=useT();
  const C={green:{bg:t.okl,tx:t.ok},red:{bg:t.erl,tx:t.er},amber:{bg:t.pl,tx:t.p},teal:{bg:t.agl,tx:t.ag},gray:{bg:'oklch(92% 0.001 0)',tx:'oklch(52% 0.003 0)'},purple:{bg:'oklch(94% 0.05 285)',tx:'oklch(55% 0.18 285)'}};
  const c=C[color]||C.gray;
  return <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',borderRadius:5,fontSize:11,fontWeight:600,letterSpacing:0.1,background:c.bg,color:c.tx,flexShrink:0}}>{children}</span>;
}
function Dot({status}){
  const t=useT();
  const M={completed:{c:t.ok},running:{c:t.ag,pulse:true},waiting:{c:t.p,pulse:true},pending:{c:'oklch(80% 0.003 0)'},failed:{c:t.er}};
  const s=M[status]||M.pending;
  return(
    <span style={{position:'relative',display:'inline-flex',alignItems:'center',justifyContent:'center',width:10,height:10,flexShrink:0}}>
      {s.pulse&&<span style={{position:'absolute',inset:-3,borderRadius:'50%',background:s.c,opacity:0.22,animation:'pulse-ring 1.6s ease-out infinite'}}/>}
      <span style={{width:8,height:8,borderRadius:'50%',background:s.c}}/>
    </span>
  );
}
function OwnerTag({owner,role}){
  const t=useT();
  const rn={planner:'Planner',tasker:'Breakdown',coder:'Coding',tester:'Test',reviewer:'Review',summarizer:'Summarizer'};

    ?<span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'1px 7px',borderRadius:5,fontSize:10.5,fontWeight:700,background:t.pl,color:t.p,border:`1px solid ${t.pb}`,flexShrink:0}}>👤 人工</span>

}

/* ─── FLOW NAVIGATOR ─────────────────────────────────────────────── */
function FlowNav({state,setState}){
  const t=useT();
  return(
    <div style={{display:'flex',alignItems:'center',gap:0,padding:'9px 16px',background:t.sb,backdropFilter:'blur(16px)',WebkitBackdropFilter:'blur(16px)',borderBottom:`1px solid ${t.glb}`,overflowX:'auto',flexShrink:0}}>
      <span style={{fontSize:10.5,fontWeight:700,color:t.txs,letterSpacing:0.5,marginRight:10,flexShrink:0}}>FLOW</span>
      <div style={{display:'flex',alignItems:'center',gap:1}}>
        {FLOW_META.map((m,i)=>{
          const active=state===i+1;const done=state>i+1;
          const accent=m.human?t.p:t.ag;
          return(
            <React.Fragment key={i}>
              {i>0&&<div style={{width:12,height:1.5,background:done?t.ok:active?accent:'rgba(0,0,0,0.09)',transition:'background 0.2s',flexShrink:0}}/>}
              <button onClick={()=>setState(i+1)} title={m.hint} style={{
                display:'flex',flexDirection:'column',alignItems:'center',gap:2,padding:'3px 7px',
                borderRadius:7,border:'none',cursor:'pointer',
                background:active?(m.human?t.pl:t.agl):'transparent',
                outline:active?`2px solid ${accent}`:'none',outlineOffset:1,
                transition:'all 0.15s',flexShrink:0
              }}>
                <div style={{width:20,height:20,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:done?t.ok:active?accent:'rgba(0,0,0,0.08)',fontSize:9.5,fontWeight:700,color:done||active?'white':t.txs,transition:'all 0.2s'}}>
                  {done?'✓':i+1}
                </div>
                <span style={{fontSize:9.5,fontWeight:active?700:400,color:active?accent:t.txs,whiteSpace:'nowrap'}}>{m.label}</span>
              </button>
            </React.Fragment>
          );
        })}
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:7,paddingLeft:12,flexShrink:0,alignItems:'center'}}>
        <span style={{fontSize:10,color:t.p,fontWeight:600,background:t.pl,border:`1px solid ${t.pb}`,borderRadius:4,padding:'2px 6px'}}>👤 人工</span>
        <span style={{fontSize:10,color:t.ag,fontWeight:600,background:t.agl,border:`1px solid ${t.ag}40`,borderRadius:4,padding:'2px 6px'}}>🤖 Agent</span>

    </div>

}

function PlaceholderModal({title,desc,onClose}){const t=useT();return(<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.2)',backdropFilter:'blur(4px)',zIndex:150,display:'flex',alignItems:'center',justifyContent:'center'}}><Glass style={{width:420,padding:24,animation:'slideUp 0.3s ease both'}}><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}><h3 style={{fontSize:15,fontWeight:700,color:t.tx}}>{title}</h3><button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:t.txs,fontSize:17}}>✕</button></div><div style={{padding:'14px',borderRadius:10,background:'rgba(0,0,0,0.04)',border:'1.5px dashed rgba(0,0,0,0.1)',textAlign:'center',marginBottom:16}}><div style={{fontSize:24,marginBottom:6}}>🚧</div><div style={{fontSize:13,color:t.txm,lineHeight:1.6}}>{desc}</div></div><Btn variant="outline" style={{width:'100%',justifyContent:'center'}} onClick={onClose}>关闭</Btn></Glass></div>);}

function AgentBanner({role,logs=[]}){  
  const t=useT();
  const rn={planner:'Planner Agent',tasker:'Task Breakdown Agent',coder:'Coding Agent',tester:'Test Agent',reviewer:'Review Agent',summarizer:'Summarizer Agent'};
  const[tick,st]=useState(0);const[warn,sw]=useState(false);
  useEffect(()=>{const id=setInterval(()=>st(x=>{if(x+1>=90)sw(true);return x+1;}),1000);return()=>clearInterval(id);},[]);  
  return(
    <div style={{padding:'11px 13px',borderRadius:10,background:t.agl,border:`1px solid ${t.ag}35`,marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:8}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:t.ag,animation:'pulse-ring 1.5s ease-out infinite',flexShrink:0}}/>
        <span style={{fontSize:12.5,fontWeight:700,color:t.ag}}>{rn[role]||'Agent'} 运行中</span>
        <span style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:5}}>{warn&&<span style={{fontSize:10,fontWeight:700,color:t.er,background:t.erl,padding:'1px 6px',borderRadius:4,animation:'pulse-ring 1.5s ease-out infinite'}}>⚠ 可能无响应</span>}<span style={{fontSize:10,color:t.txs,fontFamily:'JetBrains Mono,monospace'}}>{tick}s / 90s</span></span>
      </div>
      <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:10.5,color:t.txm,lineHeight:1.8}}>
        {logs.map((l,i)=><div key={i} style={{display:'flex',gap:5,opacity:i===logs.length-1?1:0.5}}><span style={{color:t.ag}}>{i===logs.length-1?'▶':'✓'}</span><span>{l}</span></div>)}
        <span style={{color:t.ag,animation:'blink 1s step-end infinite'}}>█</span>
      </div>
    </div>
  );
}

        </button>
      ))}
      <div style={{marginTop:'auto',padding:'8px',borderRadius:8,background:'rgba(0,0,0,0.04)',border:'1px solid rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:t.ok}}/>
          <span style={{fontSize:10,fontWeight:600,color:t.ok}}>Runner 在线</span>
        </div>
        <div style={{fontSize:9.5,color:t.txs,fontFamily:'JetBrains Mono,monospace'}}>localhost:7432</div>
      </div>
    </div>

}

/* ─── WORKSPACE VIEW ─────────────────────────────────────────────── */
function WorkspaceView({flowState,setFlowState}){
  const t=useT();
  const[panelFull,sPF]=useState(false);
  const[showFind,sSF]=useState(false);
  const[showTO,sSTO]=useState(false);
  const[showMobile,sSM]=useState(false);
  const[toast,sToast]=useState(null);
  const statuses=FLOW_ST[flowState-1]||[];
  const steps=STEP_DEFS.map((s,i)=>({...s,status:statuses[i]||'pending'}));
  const activeIdx=statuses.lastIndexOf('waiting')>=0?statuses.lastIndexOf('waiting'):statuses.lastIndexOf('running');
  const advance=()=>setFlowState(s=>Math.min(s+1,11));

  const banners={
    3:{text:'步骤 2 — 需要你确认 PRD 就绪',type:'human'},
    4:{text:'Planner Agent 正在生成工程计划…',type:'agent'},
    5:{text:'步骤 3 — 工程计划已生成，等待你审批',type:'human'},
    6:{text:'Task Breakdown Agent 正在拆解任务…',type:'agent'},
    7:{text:'Coding Agent 正在实现代码，可查看实时 diff',type:'agent'},
    8:{text:'Test Agent 正在运行测试套件…',type:'agent'},
    9:{text:'Review Agent 正在审查代码 diff…',type:'agent'},
    10:{text:'步骤 8 — 代码审查完成，等待你的最终决策',type:'human'},
    11:{text:'工作流完成！PR #247 已创建',type:'done'},
  };
  const banner=banners[flowState];

  const renderPanel=()=>{
    const props={full:panelFull,setFull:sPF,onMobile:()=>sSM(true)};
    switch(flowState){
      case 3: return <PanelPRDConfirm {...props} onAdvance={advance}/>;
      case 4: return <PanelAgentRunning {...props} role="planner" nextStep="审批工程计划"/>;
      case 5: return <PanelPlanApproval {...props} onAdvance={advance} onRequest={()=>sSF(true)} onTakeOver={()=>sSTO(true)}/>;
      case 6: return <PanelAgentRunning {...props} role="tasker" nextStep="Agent 实现"/>;
      case 7: return <PanelCoding {...props}/>;
      case 8: return <PanelTest {...props}/>;
      case 9: return <PanelAgentRunning {...props} role="review" nextStep="最终人工审查"/>;
      case 10: return <PanelReview {...props} onAdvance={advance} onRequest={()=>sSF(true)} onTakeOver={()=>sSTO(true)}/>;      
      case 11: return <PanelDone {...props}/>;
      default: return null;
    }
  };
  const panel=renderPanel();

  return(
    <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
      <FlowNav state={flowState} setState={setFlowState}/>
      <div style={{flex:1,display:'flex',overflow:'hidden',position:'relative'}}>
        {/* LEFT: timeline (narrow) */}
        {!panelFull&&(
          <div style={{width:290,flexShrink:0,overflow:'auto',padding:'18px 16px',borderRight:`1px solid ${t.glb}`,background:'rgba(255,255,255,0.15)',backdropFilter:'blur(8px)'}}>
            {/* mini header */}
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:3}}>
                <div style={{fontSize:11,color:t.txs}}>ShopFlow Web › <span style={{color:t.txm,fontWeight:600}}>checkout-cart-persist</span></div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <h2 style={{fontSize:14,fontWeight:700,color:t.tx}}>WorkflowRun <code style={{fontSize:11,fontWeight:500,background:t.pl,color:t.p,padding:'1px 6px',borderRadius:4,fontFamily:'JetBrains Mono,monospace'}}>a1b2c3</code></h2>
                <div style={{display:'flex',gap:4}}>
                  <Btn size="sm" variant="outline" style={{padding:'3px 7px',fontSize:11}} onClick={()=>setFlowState(s=>Math.max(s-1,1))}>‹</Btn>
                  <Btn size="sm" style={{padding:'3px 7px',fontSize:11}} onClick={advance} disabled={flowState>=11}>›</Btn>
                </div>
              </div>
            </div>
            {/* banner */}
            {banner&&(
              <div className="anim-fade" style={{padding:'9px 11px',borderRadius:10,marginBottom:12,background:banner.type==='human'?t.pl:banner.type==='done'?t.okl:t.agl,border:`1.5px solid ${banner.type==='human'?t.pb:banner.type==='done'?t.ok+'50':t.ag+'45'}`}}>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <span style={{fontSize:12}}>{banner.type==='human'?'⚡':banner.type==='done'?'🎉':'⟳'}</span>
                  <span style={{fontSize:11.5,fontWeight:600,color:banner.type==='human'?t.p:banner.type==='done'?t.ok:t.ag,lineHeight:1.4}}>{banner.text}</span>
                </div>
              </div>
            )}
            {/* legend */}
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:t.p,fontWeight:600}}><span style={{width:2.5,height:12,borderRadius:99,background:t.p}}/>人工</span>
              <span style={{display:'flex',alignItems:'center',gap:3,fontSize:10,color:t.ag,fontWeight:600}}><span style={{width:2.5,height:12,borderRadius:99,background:t.ag}}/>Agent</span>
            </div>
            {/* steps */}
            {steps.map((step,i)=><StepRow key={step.id} step={step} active={activeIdx===i}/>)}
            {/* branch */}
            <div style={{marginTop:12,padding:'9px 11px',borderRadius:9,background:'rgba(255,255,255,0.3)',border:'1px solid rgba(0,0,0,0.06)'}}>
              {[{l:'Branch',v:'aww/shopflow-web/a1b2c3'},{l:'Base',v:'8f3a219'},{l:'Commits',v:flowState>=7?'+7':'0'}].map((s,i)=>(

                <div key={i} style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:9.5,color:t.txs,fontWeight:600}}>{s.l}</span>
                  <span style={{fontSize:9.5,fontFamily:'JetBrains Mono,monospace',color:t.txm}}>{s.v}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        {/* RIGHT: panel (flex:1, takes most space) */}
        {panel}
        {!panel&&(
          <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',color:t.txs,flexDirection:'column',gap:10}}>
            <div style={{fontSize:32}}>⬡</div>
            <div style={{fontSize:13}}>点击上方状态节点查看详情</div>
          </div>
        )}
      </div>
      {showFind&&<FindingSel onClose={(submitted)=>{sSF(false);if(submitted)sToast('修改请求已提交，Agent 将在下次运行中处理');}}/>}
      {toast&&<Toast msg={toast} onDone={()=>sToast(null)}/>}
      {showTO&&<TakeOverModal onClose={()=>sSTO(false)}/>}
      {showMobile&&<MobileApprovalView flowState={flowState} onClose={()=>sSM(false)} onAdvance={()=>{advance();sSM(false);}} onRequest={()=>{sSM(false);sSF(true);}}/>}
    </div>
  );
}

/* ─── TWEAKS ─────────────────────────────────────────────────────── */

  const t=useT();if(!vis)return null;
  return(
    <div style={{position:'fixed',bottom:20,right:20,zIndex:200,width:220,padding:15,borderRadius:13,background:t.gl,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',border:`1px solid ${t.glb}`,boxShadow:'0 8px 40px rgba(0,0,0,0.13)',animation:'slideUp 0.25s ease both'}}>
      <div style={{fontSize:11,fontWeight:700,color:t.tx,marginBottom:12}}>TWEAKS</div>
      <div style={{marginBottom:11}}>
        <div style={{fontSize:10.5,color:t.txs,marginBottom:5,fontWeight:600}}>色彩主题</div>
        <div style={{display:'flex',gap:6}}>
          {Object.entries(TH).map(([k,v])=>(
            <button key={k} onClick={()=>setTweaks(tw=>({...tw,theme:k}))} title={v.name} style={{width:24,height:24,borderRadius:'50%',border:'none',cursor:'pointer',background:v.p,boxShadow:tweaks.theme===k?`0 0 0 2px white,0 0 0 4px ${v.p}`:'none',transition:'all 0.13s'}}/>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontSize:10.5,color:t.txs,fontWeight:600}}>Agent 日志</span>
        <div onClick={()=>setTweaks(tw=>({...tw,showLogs:!tw.showLogs}))} style={{width:30,height:17,borderRadius:9,cursor:'pointer',background:tweaks.showLogs?t.p:'rgba(0,0,0,0.14)',position:'relative',transition:'background 0.18s'}}>
          <div style={{position:'absolute',top:1.5,left:tweaks.showLogs?13:1.5,width:14,height:14,borderRadius:'50%',background:'white',transition:'left 0.18s',boxShadow:'0 1px 3px rgba(0,0,0,0.18)'}}/>
        </div>
      </div>
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────────── */
function App(){
  const stored=JSON.parse(localStorage.getItem('aww-tw2')||'null')||TWEAK_DEFAULTS;
  const[tweaks,setTweaksRaw]=useState(stored);
  const[screen,setScreen]=useState('workspace');
  const[showWizard,sSW]=useState(false);
  const[flowState,setFlowState]=useState(()=>parseInt(localStorage.getItem('aww-flow2')||'5'));
  const[twVis,sTWV]=useState(false);

  const setTweaks=fn=>{setTweaksRaw(tw=>{const next=typeof fn==='function'?fn(tw):fn;localStorage.setItem('aww-tw2',JSON.stringify(next));window.parent.postMessage({type:'__edit_mode_set_keys',edits:next},'*');return next;});};
  useEffect(()=>{localStorage.setItem('aww-flow2',String(flowState));},[flowState]);
  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode')sTWV(true);
      if(e.data?.type==='__deactivate_edit_mode')sTWV(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  const t=TH[tweaks.theme]||TH.amber;
  const isEmpty=flowState<=2&&screen==='workspace';

  return(
    <TC.Provider value={t}>
      <div style={{width:'100%',height:'100%',display:'flex',background:t.bgg,fontFamily:'DM Sans,sans-serif',color:t.tx,overflow:'hidden'}}>
        <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:0,backgroundImage:`radial-gradient(ellipse at 15% 15%,${t.p}10 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,${t.ag}0a 0%,transparent 55%)`}}/>
        <div style={{position:'relative',zIndex:1,display:'flex',flex:1,overflow:'hidden'}}>
          {!isEmpty&&<Sidebar screen={screen} setScreen={setScreen}/>}
          {isEmpty
            ? <EmptyState onStart={()=>sSW(true)}/>
            : screen==='workspace'
              ? <WorkspaceView flowState={flowState} setFlowState={setFlowState}/>
              : screen==='artifacts'?<ArtifactsView/>
              : screen==='audit'?<AuditView/>
              : <SettingsView/>
          }
        </div>
        {showWizard&&<Wizard onClose={()=>sSW(false)} onComplete={()=>{setFlowState(3);sSW(false);setScreen('workspace');}}/>}
        <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} vis={twVis}/>
      </div>
    </TC.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
